# /etc/nginx/sites-available/grammar-hero.conf
#
# Grammar Hero — Contabo VPS production config
# - Faz 6: Let's Encrypt SSL + reverse proxy → PM2/Next.js (127.0.0.1:3000)
# - Faz 7.3: Security headers (HSTS, X-Frame, X-Content-Type, Referrer, Permissions)
#
# Yenilemek için: sudo cp deploy/nginx-grammar-hero.conf /etc/nginx/sites-available/grammar-hero.conf
# Test:           sudo nginx -t
# Reload:         sudo systemctl reload nginx

server {
    server_name grammar-hero.com www.grammar-hero.com;

    # --- Security headers (Faz 7.3) ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Yüklenen dosyalar için izin verilen max boyut (default 1m çok düşük)
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Next.js'e gerçek istemci bilgilerini geçir
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / Server-Sent Events desteği
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Next.js 16 streaming (RSC, Server Actions) — buffering kapalı olmalı
        proxy_buffering off;
        proxy_cache off;

        # Timeout'lar (default'lar bazen yetmez)
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/grammar-hero.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/grammar-hero.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.grammar-hero.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = grammar-hero.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name grammar-hero.com www.grammar-hero.com;
    return 404; # managed by Certbot
}
