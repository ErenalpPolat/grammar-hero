# /etc/nginx/sites-available/grammar-hero.conf
#
# Grammar Hero — Contabo VPS production config
# - Faz 6: Let's Encrypt SSL + reverse proxy → PM2/Next.js (127.0.0.1:3000)
# - Faz 7.3: Security headers (HSTS, X-Frame, X-Content-Type, Referrer, Permissions)
# - Faz 7.4: Cloudflare proxy real IP setup
#
# Yenilemek için: sudo cp deploy/nginx-grammar-hero.conf /etc/nginx/sites-available/grammar-hero.conf
# Test:           sudo nginx -t
# Reload:         sudo systemctl reload nginx

server {
    server_name grammar-hero.com www.grammar-hero.com;

    # --- Cloudflare real client IP (Faz 7.4) ---
    # Proxy ON iken CF, origin'e kendi IP'lerinden bağlanıyor. Bunlar olmadan
    # nginx access log, fail2ban, rate-limit hep CF IP'sini görür. CF-Connecting-IP
    # header'ı ile gerçek user IP'sini geri alıyoruz.
    # IP listesi: https://www.cloudflare.com/ips/ — yılda 1-2 kez güncellenir.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # --- Security headers (Faz 7.3) ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Yüklenen dosyalar için izin verilen max boyut (default 1m çok düşük)
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Next.js'e gerçek istemci bilgilerini geçir
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / Server-Sent Events desteği
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Next.js 16 streaming (RSC, Server Actions) — buffering kapalı olmalı
        proxy_buffering off;
        proxy_cache off;

        # Timeout'lar (default'lar bazen yetmez)
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/grammar-hero.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/grammar-hero.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.grammar-hero.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = grammar-hero.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name grammar-hero.com www.grammar-hero.com;
    return 404; # managed by Certbot
}
